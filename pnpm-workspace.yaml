packages:
  - apps/*
  - packages/*
  - packages/integrations/*
  - scripts

# Require packages to be published for at least 1 day before install
# (defense against supply-chain attacks via malicious npm releases)
minimumReleaseAge: 1440

autoInstallPeers: false

onlyBuiltDependencies:
  - '@swc/core'
  - esbuild
  - msw
  - unrs-resolver

catalog:
  '@tanstack/react-query': ^5.90.21
  '@types/node': ^25.3.3
  '@types/react': ^19.2.0
  '@types/react-dom': ^19.2.0
  drizzle-orm: ^0.45.1
  # Must be this exact version because expo requires it
  react: 19.1.0
  # Must be this exact version because expo requires it
  react-dom: 19.1.0
  tsx: ^4.21.0
  zod: ^3.25.76

overrides:
  # drizzle-kit uses an older esbuild internally — pin it to the patched version
  "@esbuild-kit/esm-loader": "npm:tsx@^4.21.0"
  esbuild: "0.27.3"
